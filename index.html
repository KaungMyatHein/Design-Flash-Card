<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Flash Cards</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Myanmar:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #08080f;
      --surface: rgba(255,255,255,0.04);
      --surface-solid: #131320;
      --surface-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.06);
      --text: #eeeef4;
      --text-muted: #7b7b9a;
      --text-dim: #4e4e6a;
      --overlay-bg: rgba(0,0,0,0.75);
      --reveal-bg: rgba(19,19,32,0.7);
      --scrollbar-thumb: rgba(255,255,255,0.08);
      --accent-1: #7c6aff;
      --accent-2: #ff6b9d;
      --accent-3: #22d3ee;
      --accent-4: #fbbf24;
      --accent-5: #34d399;
      --gradient-1: linear-gradient(135deg, #7c6aff 0%, #c084fc 100%);
      --gradient-2: linear-gradient(135deg, #22d3ee 0%, #7c6aff 100%);
      --gradient-3: linear-gradient(135deg, #ff6b9d 0%, #fbbf24 100%);
      --gradient-4: linear-gradient(135deg, #34d399 0%, #22d3ee 100%);
      --gradient-5: linear-gradient(135deg, #fbbf24 0%, #ff6b9d 100%);
      --card-bg-1: linear-gradient(160deg, rgba(124,106,255,0.12) 0%, rgba(124,106,255,0.02) 100%);
      --card-bg-2: linear-gradient(160deg, rgba(34,211,238,0.10) 0%, rgba(34,211,238,0.02) 100%);
      --card-bg-3: linear-gradient(160deg, rgba(255,107,157,0.10) 0%, rgba(255,107,157,0.02) 100%);
      --card-bg-4: linear-gradient(160deg, rgba(52,211,153,0.10) 0%, rgba(52,211,153,0.02) 100%);
      --card-bg-5: linear-gradient(160deg, rgba(251,191,36,0.10) 0%, rgba(251,191,36,0.02) 100%);
      --answer-bg: rgba(124,106,255,0.08);
      --answer-border: rgba(124,106,255,0.15);
      --why-bg: rgba(255,107,157,0.06);
      --why-border: rgba(255,107,157,0.12);
      --tag-bg: rgba(124,106,255,0.1);
      --radius: 20px;
      --radius-sm: 12px;
    }

    html.light {
      --bg: #f3f3f8;
      --surface: rgba(255,255,255,0.8);
      --surface-solid: #ffffff;
      --surface-hover: rgba(255,255,255,1);
      --border: rgba(0,0,0,0.06);
      --text: #1a1a2e;
      --text-muted: #6b6b8a;
      --text-dim: #9e9eb8;
      --overlay-bg: rgba(243,243,248,0.85);
      --reveal-bg: rgba(255,255,255,0.7);
      --scrollbar-thumb: rgba(0,0,0,0.08);
      --card-bg-1: linear-gradient(160deg, rgba(124,106,255,0.08) 0%, rgba(124,106,255,0.01) 100%);
      --card-bg-2: linear-gradient(160deg, rgba(34,211,238,0.07) 0%, rgba(34,211,238,0.01) 100%);
      --card-bg-3: linear-gradient(160deg, rgba(255,107,157,0.07) 0%, rgba(255,107,157,0.01) 100%);
      --card-bg-4: linear-gradient(160deg, rgba(52,211,153,0.07) 0%, rgba(52,211,153,0.01) 100%);
      --card-bg-5: linear-gradient(160deg, rgba(251,191,36,0.07) 0%, rgba(251,191,36,0.01) 100%);
      --answer-bg: rgba(124,106,255,0.05);
      --answer-border: rgba(124,106,255,0.12);
      --why-bg: rgba(255,107,157,0.04);
      --why-border: rgba(255,107,157,0.1);
      --tag-bg: rgba(124,106,255,0.07);
    }

    body {
      font-family: 'Inter', 'Noto Sans Myanmar', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.4s, color 0.4s;
    }

    /* Ambient glow */
    .glow { position: fixed; pointer-events: none; z-index: 0; border-radius: 50%; filter: blur(100px); }
    .glow-1 { top: -10%; left: 10%; width: 500px; height: 500px; background: rgba(124,106,255,0.06); }
    .glow-2 { bottom: 0; right: 5%; width: 400px; height: 400px; background: rgba(255,107,157,0.04); }
    .glow-3 { top: 40%; left: 50%; width: 350px; height: 350px; background: rgba(34,211,238,0.03); }
    html.light .glow-1 { background: rgba(124,106,255,0.04); }
    html.light .glow-2 { background: rgba(255,107,157,0.03); }
    html.light .glow-3 { background: rgba(34,211,238,0.02); }

    .app {
      position: relative; z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    .toggle-group {
      display: flex;
      border-radius: 50px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: var(--surface-solid);
      transition: background 0.3s, border-color 0.3s;
    }

    .toggle-btn {
      padding: 7px 14px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.78rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s;
      display: flex; align-items: center; gap: 5px;
    }

    .toggle-btn.active { background: var(--accent-1); color: white; }
    .toggle-btn:hover:not(.active) { color: var(--text); }
    .toggle-btn svg { width: 14px; height: 14px; }

    /* Header */
    .header { text-align: center; margin-bottom: 40px; }

    .header h1 {
      font-size: 2.2rem; font-weight: 800;
      background: var(--gradient-1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .header p { color: var(--text-muted); font-size: 0.95rem; font-weight: 300; }

    .stats {
      display: flex; justify-content: center; gap: 24px; margin-top: 16px;
    }

    .stat { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: var(--text-muted); }
    .stat-num { font-weight: 700; color: var(--text); }

    /* Search */
    .search-bar { position: relative; margin-bottom: 28px; }

    .search-bar input {
      width: 100%;
      padding: 13px 20px 13px 46px;
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .search-bar input::placeholder { color: var(--text-dim); }
    .search-bar input:focus { border-color: var(--accent-1); box-shadow: 0 0 0 3px rgba(124,106,255,0.12); }

    .search-bar svg {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%); color: var(--text-dim);
    }

    /* Tag filter - removed, search handles tags */

    /* ===== BENTO GRID ===== */
    .bento-grid {
      columns: 3;
      column-gap: 16px;
    }

    .card-item {
      break-inside: avoid;
      margin-bottom: 16px;
      border-radius: var(--radius);
      padding: 28px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1), box-shadow 0.35s, border-color 0.3s;
    }

    .card-item:hover {
      transform: translateY(-4px);
      border-color: rgba(124,106,255,0.2);
    }

    html.light .card-item:hover {
      box-shadow: 0 12px 40px rgba(124,106,255,0.1);
    }

    /* Card color variants */
    .card-item[data-color="0"] { background: var(--card-bg-1); }
    .card-item[data-color="1"] { background: var(--card-bg-2); }
    .card-item[data-color="2"] { background: var(--card-bg-3); }
    .card-item[data-color="3"] { background: var(--card-bg-4); }
    .card-item[data-color="4"] { background: var(--card-bg-5); }

    .card-title {
      font-size: 1.1rem; font-weight: 700;
      line-height: 1.35;
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .card-question {
      font-size: 0.85rem; color: var(--text-muted);
      line-height: 1.55; font-weight: 300;
    }

    /* Tall cards show answer preview */
    .card-answer-preview {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.5;
      font-weight: 300;
    }

    html.light .card-answer-preview { background: rgba(0,0,0,0.02); }

    .card-tags {
      display: flex; gap: 5px; margin-top: 16px; flex-wrap: wrap;
    }

    .card-tag {
      font-size: 0.65rem; padding: 3px 9px;
      border-radius: 50px;
      background: var(--tag-bg);
      color: var(--accent-1); font-weight: 500;
      letter-spacing: 0.2px;
    }

    .card-arrow {
      position: absolute;
      top: 24px; right: 24px;
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim);
      transition: all 0.3s;
    }

    .card-item:hover .card-arrow {
      border-color: var(--accent-1);
      color: var(--accent-1);
      background: rgba(124,106,255,0.1);
    }

    /* ===== DETAIL VIEW ===== */
    .detail-overlay {
      position: fixed; inset: 0;
      background: var(--overlay-bg);
      backdrop-filter: blur(12px);
      z-index: 100; display: none;
      align-items: center; justify-content: center;
      padding: 24px; opacity: 0;
      transition: opacity 0.3s;
    }

    .detail-overlay.active { display: flex; opacity: 1; }

    .detail-card {
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: 24px;
      width: 100%; max-width: 620px; max-height: 90vh;
      overflow-y: auto; position: relative;
      animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1);
      transition: background 0.3s, border-color 0.3s;
    }

    html.light .detail-card { box-shadow: 0 24px 80px rgba(0,0,0,0.12); }

    @keyframes slideUp {
      from { transform: translateY(30px) scale(0.97); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    .detail-gradient-bar { height: 3px; border-radius: 24px 24px 0 0; }
    .detail-content { padding: 36px; }

    .detail-close {
      position: absolute; top: 18px; right: 18px;
      width: 34px; height: 34px; border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-solid); color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; z-index: 10;
    }

    .detail-close:hover { background: var(--surface-hover); color: var(--text); }

    .detail-title {
      font-size: 1.4rem; font-weight: 800;
      margin-bottom: 28px; padding-right: 44px;
      letter-spacing: -0.3px; line-height: 1.3;
    }

    .detail-section { margin-bottom: 24px; }

    .detail-label {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }

    .label-question { color: var(--accent-3); }
    .label-answer { color: var(--accent-1); }
    .label-why { color: var(--accent-2); }

    .detail-text { font-size: 0.92rem; line-height: 1.75; color: var(--text); font-weight: 300; }

    .detail-answer-box {
      background: var(--answer-bg);
      border: 1px solid var(--answer-border);
      border-radius: var(--radius-sm);
      padding: 16px 20px; cursor: pointer;
      transition: all 0.3s;
      position: relative; overflow: hidden;
    }

    .detail-answer-box.hidden .detail-text { filter: blur(8px); user-select: none; }

    .detail-answer-box .reveal-hint {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem; color: var(--accent-1); font-weight: 500;
      background: var(--reveal-bg); transition: opacity 0.3s;
    }

    .detail-answer-box:not(.hidden) .reveal-hint { opacity: 0; pointer-events: none; }

    .detail-why-box {
      background: var(--why-bg);
      border: 1px solid var(--why-border);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
    }

    .detail-why-list { list-style: none; padding: 0; margin: 0; }
    .detail-why-list li {
      padding: 5px 0; font-size: 0.9rem;
      color: var(--text); font-weight: 300;
      display: flex; align-items: flex-start; gap: 10px;
      line-height: 1.6;
    }
    .detail-why-list li::before {
      content: ''; width: 5px; height: 5px;
      border-radius: 50%; background: var(--accent-5);
      flex-shrink: 0; margin-top: 9px;
    }

    .detail-examples { list-style: none; padding: 0; }

    .detail-examples li {
      padding: 6px 0; font-size: 0.88rem;
      color: var(--text-muted); font-weight: 300;
      display: flex; align-items: flex-start; gap: 10px;
      line-height: 1.5;
    }

    .detail-examples li::before {
      content: ''; width: 5px; height: 5px;
      border-radius: 50%; background: var(--accent-1);
      flex-shrink: 0; margin-top: 8px;
    }

    .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

    .detail-tag {
      font-size: 0.72rem; padding: 4px 12px;
      border-radius: 50px; background: var(--tag-bg);
      color: var(--accent-1);
    }

    /* Detail nav */
    .detail-nav {
      display: flex; justify-content: space-between;
      padding: 14px 36px 24px;
      border-top: 1px solid var(--border);
    }

    .detail-nav-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 16px; border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent; color: var(--text-muted);
      font-size: 0.82rem; font-family: inherit;
      cursor: pointer; transition: all 0.2s;
    }

    .detail-nav-btn:hover { background: var(--surface-hover); color: var(--text); border-color: var(--accent-1); }
    .detail-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Keyboard hints */
    .keyboard-hints {
      display: flex; justify-content: center;
      gap: 16px; margin-top: 48px; flex-wrap: wrap;
    }

    .kbd-hint {
      display: flex; align-items: center;
      gap: 6px; font-size: 0.72rem; color: var(--text-dim);
    }

    kbd {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 22px; height: 22px; padding: 0 5px;
      border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface-solid); font-size: 0.65rem;
      font-family: inherit; color: var(--text-muted);
    }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); grid-column: 1/-1; }
    .empty-state svg { margin-bottom: 16px; opacity: 0.3; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

    /* Responsive */
    @media (max-width: 850px) {
      .bento-grid { columns: 2; }
    }

    @media (max-width: 550px) {
      .app { padding: 20px 14px 60px; }
      .header h1 { font-size: 1.6rem; }
      .bento-grid { columns: 1; }
      .detail-content { padding: 24px; }
      .detail-title { font-size: 1.2rem; }
      .detail-nav { padding: 12px 24px 20px; }
      .keyboard-hints { display: none; }
      .top-bar { gap: 6px; }
      .toggle-btn { padding: 6px 10px; font-size: 0.72rem; }
    }
  </style>
</head>

  <div class="app">

    <header class="header">

    <div class="search-bar">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" autocomplete="off">

    <div class="bento-grid" id="card-list"></div>

  <!-- Detail overlay -->
  <div class="detail-overlay" id="detail-overlay">
    <div class="detail-card" id="detail-card">
      <div class="detail-gradient-bar" id="detail-gradient-bar"></div>
      <button class="detail-close" id="detail-close">

      </button>
      <div class="detail-content" id="detail-content"></div>
      <div class="detail-nav">
        <button class="detail-nav-btn" id="prev-btn"></button>
        <button class="detail-nav-btn" id="next-btn"></button>
      </div>
      <div class="keyboard-hints" id="keyboard-hints"></div>
    </div>
  </div>

        noCards: "\u1000\u1012\u103A\u101B\u103E\u102C\u1019\u1010\u103D\u1031\u1037\u1015\u102B",
        kbdOpen: "\u1016\u103D\u1004\u1037\u103A", kbdClose: "\u1015\u102D\u1010\u103A",
        kbdNav: "\u101B\u103D\u1031\u1037", kbdReveal: "\u1021\u1016\u103C\u1031\u1015\u103C"
      }
    };

    // Card icons (SVG paths)
    const icons = [
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>',
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z"/><path d="M3 9h18M9 3v18"/></svg>',
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><path d="M4 22v-7"/></svg>',
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>',
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>',
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>'
    ];

    // Bento size patterns: which cards are "tall" (show answer preview)
    const bentoPattern = [true, false, false, false, true, true, false, true];

    // cardFiles loaded from cards-data.js (generated by build.js)
    // To add cards: create .md in cards/ folder, then run: node build.js

    // ========== State ==========
    let currentLang = 'en';
    let currentTheme = 'dark';
    let currentIndex = -1;
    let filteredCards = [...cardFiles];

    // ========== Elements ==========
    const cardListEl = document.getElementById('card-list');
    const searchInput = document.getElementById('search');
    const overlay = document.getElementById('detail-overlay');
    const detailContent = document.getElementById('detail-content');
    const detailGradientBar = document.getElementById('detail-gradient-bar');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const closeBtn = document.getElementById('detail-close');
    const langToggle = document.getElementById('lang-toggle');
    const themeToggle = document.getElementById('theme-toggle');

    const allTags = [...new Set(cardFiles.flatMap(c => c.tags))].sort();

    // ========== Helpers ==========
    function t(key) { return i18n[currentLang][key]; }
    function ct(card, field) { const v = card[field]; return typeof v === 'string' ? v : v[currentLang]; }
    function cl(card, field) { const v = card[field]; return Array.isArray(v) && typeof v[0] === 'string' ? v : v[currentLang]; }

    function getGradient(i) {
      const g = ['linear-gradient(135deg, #7c6aff, #c084fc)', 'linear-gradient(135deg, #22d3ee, #7c6aff)', 'linear-gradient(135deg, #ff6b9d, #fbbf24)', 'linear-gradient(135deg, #34d399, #22d3ee)', 'linear-gradient(135deg, #fbbf24, #ff6b9d)'];
      return g[i % g.length];
    }

    // ========== UI text ==========
    function updateUIText() {
      document.getElementById('main-title').textContent = t('title');
      document.getElementById('main-subtitle').textContent = t('subtitle');
      document.getElementById('stat-cards').textContent = t('cards');
      document.getElementById('stat-topics').textContent = t('topics');
      document.getElementById('card-count').textContent = cardFiles.length;
      document.getElementById('tag-count').textContent = allTags.length;
      searchInput.placeholder = t('search');
      prevBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg> ${t('previous')}`;
      nextBtn.innerHTML = `${t('next')} <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>`;
      document.getElementById('keyboard-hints').innerHTML = `
        <span class="kbd-hint"><kbd>Enter</kbd> ${t('kbdOpen')}</span>
        <span class="kbd-hint"><kbd>Esc</kbd> ${t('kbdClose')}</span>
        <span class="kbd-hint"><kbd>&larr;</kbd><kbd>&rarr;</kbd> ${t('kbdNav')}</span>
        <span class="kbd-hint"><kbd>Space</kbd> ${t('kbdReveal')}</span>`;
    }

    function filterCards() {
      const q = searchInput.value.toLowerCase().trim();
      filteredCards = cardFiles.filter(card => {
        if (!q) return true;
        return ct(card,'title').toLowerCase().includes(q) ||
          ct(card,'question').toLowerCase().includes(q) ||
          ct(card,'answer').toLowerCase().includes(q) ||
          card.tags.some(t => t.includes(q));
      });
      renderList();
    }

    function renderList() {
      if (filteredCards.length === 0) {
        cardListEl.innerHTML = `<div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <p>${t('noCards')}</p></div>`;
        return;
      }

      cardListEl.innerHTML = filteredCards.map((card, i) => {
        const gi = cardFiles.indexOf(card);
        const colorIdx = gi % 5;
        const isTall = bentoPattern[gi % bentoPattern.length];

        let html = `<div class="card-item" data-index="${gi}" data-color="${colorIdx}" tabindex="0">
          <div class="card-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg></div>
          <div class="card-title">${ct(card, 'title')}</div>
          <div class="card-question">${ct(card, 'question')}</div>`;

        html += `<div class="card-tags">${card.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div></div>`;
        return html;
      }).join('');
    }

    function openDetail(index) {
      currentIndex = index;
      const card = cardFiles[index];
      detailGradientBar.style.background = getGradient(index);

      detailContent.innerHTML = `
        <h2 class="detail-title">${ct(card, 'title')}</h2>
        <div class="detail-section">
          <div class="detail-label label-question">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
            ${t('question')}
          </div>
          <p class="detail-text">${ct(card, 'question')}</p>
        </div>
        <div class="detail-section">
          <div class="detail-label label-answer">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg>
            ${t('answer')}
          </div>
          <div class="detail-answer-box hidden" id="answer-box">
            <p class="detail-text">${ct(card, 'answer')}</p>
            <div class="reveal-hint">${t('reveal')}</div>
          </div>
        </div>
        <div class="detail-section detail-hidden-until-reveal" style="display:none">
          <div class="detail-label label-why">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21 11.5-8.5 8.5-5-5L2 20.5"/><path d="m21 5-8.5 8.5"/></svg>
            ${t('why')}
          </div>
          <div class="detail-why-box"><ul class="detail-why-list">${ct(card, 'why').split('\n').filter(l => l.trim()).map(l => `<li>${l.replace(/^-\s*/, '')}</li>`).join('')}</ul></div>
        </div>
        <div class="detail-section detail-hidden-until-reveal" style="display:none">
          <div class="detail-label" style="color: var(--text-muted)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/></svg>
            ${t('examples')}
          </div>
          <ul class="detail-examples">${cl(card, 'examples').map(e => `<li>${e}</li>`).join('')}</ul>
        </div>
        <div class="detail-tags">${card.tags.map(t => `<span class="detail-tag">${t}</span>`).join('')}</div>`;

      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === cardFiles.length - 1;
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeDetail() {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
      currentIndex = -1;
    }

    function toggleAnswer() {
      const box = document.getElementById('answer-box');
      if (box) {
        box.classList.toggle('hidden');
        if (!box.classList.contains('hidden')) {
          document.querySelectorAll('.detail-hidden-until-reveal').forEach(el => el.style.display = '');
        }
      }
    }

    // ========== Theme & Lang ==========
    function setTheme(theme) {
      currentTheme = theme;
      document.documentElement.classList.toggle('light', theme === 'light');
      themeToggle.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.theme === theme));
      localStorage.setItem('dfc-theme', theme);
    }

    function setLang(lang) {
      currentLang = lang;
      langToggle.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
      updateUIText();
      filterCards();
      if (currentIndex >= 0) openDetail(currentIndex);
      localStorage.setItem('dfc-lang', lang);
    }

    // ========== Events ==========
    langToggle.addEventListener('click', e => { const b = e.target.closest('.toggle-btn'); if (b?.dataset.lang) setLang(b.dataset.lang); });
    themeToggle.addEventListener('click', e => { const b = e.target.closest('.toggle-btn'); if (b?.dataset.theme) setTheme(b.dataset.theme); });
    cardListEl.addEventListener('click', e => { const item = e.target.closest('.card-item'); if (item) openDetail(parseInt(item.dataset.index)); });
    closeBtn.addEventListener('click', closeDetail);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeDetail(); });
    prevBtn.addEventListener('click', () => { if (currentIndex > 0) openDetail(currentIndex - 1); });
    nextBtn.addEventListener('click', () => { if (currentIndex < cardFiles.length - 1) openDetail(currentIndex + 1); });
    searchInput.addEventListener('input', filterCards);

    document.addEventListener('keydown', e => {
      if (overlay.classList.contains('active')) {
        if (e.key === 'Escape') closeDetail();
        if (e.key === 'ArrowLeft' && currentIndex > 0) { e.preventDefault(); openDetail(currentIndex - 1); }
        if (e.key === 'ArrowRight' && currentIndex < cardFiles.length - 1) { e.preventDefault(); openDetail(currentIndex + 1); }
        if (e.key === 'ArrowUp' && currentIndex > 0) { e.preventDefault(); openDetail(currentIndex - 1); }
        if (e.key === 'ArrowDown' && currentIndex < cardFiles.length - 1) { e.preventDefault(); openDetail(currentIndex + 1); }
        if (e.key === ' ') { e.preventDefault(); toggleAnswer(); }
      } else if (e.key === 'Enter') {
        const f = document.activeElement;
        if (f?.classList.contains('card-item')) { e.preventDefault(); openDetail(parseInt(f.dataset.index)); }
      }
    });

    document.addEventListener('click', e => { if (e.target.closest('#answer-box')) toggleAnswer(); });

    // ========== Init ==========
    setTheme(localStorage.getItem('dfc-theme') || 'dark');
    setLang(localStorage.getItem('dfc-lang') || 'en');
  </script>
</body>
</html>
